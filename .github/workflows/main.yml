name: CI

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if no Frida update is available'
        required: false
        default: false
        type: boolean
  repository_dispatch:   # 由 phantom-frida 发布后自动触发
  # schedule:
  #   - cron: "8 13 * * *"
  # 如需恢复独立定时模式（从官方 frida 下载），取消上方两行注释，
  # 同时清空 PHANTOM_FRIDA_REPO variable 即可。

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build
        run: |
          uv run python3 main.py
          echo "NEW_TAG=$(cat NEW_TAG.txt 2>/dev/null || echo '')" >> $GITHUB_ENV
        env:
          FORCE_RELEASE: ${{ github.event.inputs.force_release }}
          PHANTOM_FRIDA_REPO: ${{ vars.PHANTOM_FRIDA_REPO }}
          FRIDA_VERSION: ${{ github.event.client_payload.frida_version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: build/

      - name: Release
        if: hashFiles('NEW_TAG.txt') != ''
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/*.zip,build/updater.json
          tag: "${{ env.NEW_TAG }}"
          body: https://github.com/frida/frida/releases
